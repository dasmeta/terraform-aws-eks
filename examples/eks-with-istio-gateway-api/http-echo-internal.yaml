# helm diff upgrade --install -n default http-echo-internal dasmeta/base --version 0.3.18 -f ./http-echo.yaml -f ./http-echo-internal.yaml
# this file is used to override the http-echo.yaml file for the internal gateway
gatewayApi:
  # HTTPRoute: Route internal traffic to the service with 403 for /forbidden path
  httpRoutes:
    - name: http-echo-route-internal
      parentRefs:
        - name: main-internal
          sectionName: https-443
      hostnames:
        - "internal.${domain}"
      rules:
        # Rule 1: Return 403 for /forbidden path (automatically creates AuthorizationPolicy)
        - matches:
            - path:
                value: /forbidden
                type: PathPrefix
          directResponse:
            status: 403
        # Rule 2: Route all other traffic to the service
        - matches:
            - path:
                value: /
                type: PathPrefix
